name: PR validation

on:
  pull_request:
    branches:
      - gh-pages

jobs:
  run:
    runs-on: ubuntu-latest
    name: Test changed files
    steps:
      # Sparse checkout automatically uses --filter=blob:none,
      # so only .github/ blobs are fetched (no zip file downloads).
      # fetch-depth: 2 gives us the merge commit's parent for diffing.
      - name: Checkout .github only
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          # Pinned to 3.13 because pe_tools is incompatible with 3.14+
          # (PEP 749 changed __annotations__ behavior, breaking pe_tools' Struct3).
          python-version: '3.13'
          cache-dependency-path: '.github/requirements.txt'

      - name: Install Python dependencies
        run: python -m pip install -r .github/requirements.txt

      - name: Validate changed files
        run: |
          # Get changed files from git (only tree objects needed, no blobs).
          added=()
          modified=()
          other=()
          while IFS=$'\t' read -r status file; do
            case "$status" in
              A) added+=("$file") ;;
              M) modified+=("$file") ;;
              *) other+=("$file") ;;
            esac
          done < <(git diff --name-status HEAD~1)

          # Check that all changes are either added or modified files.
          if [ ${#other[@]} -gt 0 ]; then
            echo "Error: Only added and modified files are allowed, but found: ${other[*]}"
            exit 1
          fi

          # Check that only .zip files and themes.yaml are modified or added.
          for file in "${modified[@]}"; do
            if [[ "$file" != "themes.yaml" && "$file" != *.zip ]]; then
              echo "Error: Only themes.yaml and .zip files are allowed to be modified, but found: $file"
              exit 1
            fi
          done

          for file in "${added[@]}"; do
            if [[ "$file" != *.zip ]]; then
              echo "Error: Only .zip files are allowed to be added, but found: $file"
              exit 1
            fi
          done

          # If there are added files, themes.yaml must be updated.
          if [ ${#added[@]} -gt 0 ]; then
            themes_yaml_updated=false
            for file in "${modified[@]}"; do
              if [ "$file" = "themes.yaml" ]; then
                themes_yaml_updated=true
                break
              fi
            done

            if [ "$themes_yaml_updated" = false ]; then
              echo "Error: When adding new files, themes.yaml must be updated."
              exit 1
            fi
          fi

          # Collect all .zip files (both added and modified)
          zip_files=()
          for file in "${added[@]}" "${modified[@]}"; do
            if [[ "$file" == *.zip ]]; then
              zip_files+=("$file")
            fi
          done

          if [ ${#zip_files[@]} -gt 0 ]; then
            # Lazy-fetch only the needed zip blobs via the partial clone.
            git checkout HEAD -- "${zip_files[@]}"

            echo "Validating theme files: ${zip_files[*]}"
            python .github/theme_validator.py --packed_themes "${zip_files[@]}"
          fi
