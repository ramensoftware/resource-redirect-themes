name: PR validation

on:
  pull_request:
    branches:
      - gh-pages

jobs:
  run:
    runs-on: ubuntu-latest
    name: Test changed files
    steps:
      # Sparse checkout automatically uses --filter=blob:none,
      # so only .github/ blobs are fetched (no zip file downloads).
      # fetch-depth: 2 gives us the merge commit's parent for diffing.
      - name: Checkout .github only
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          fetch-depth: 2

      - name: Get changed files
        id: changed
        run: |
          added=()
          modified=()
          other=()
          while IFS=$'\t' read -r status file; do
            case "$status" in
              A) added+=("$file") ;;
              M) modified+=("$file") ;;
              *) other+=("$file") ;;
            esac
          done < <(git diff --name-status HEAD~1)

          # Export as newline-delimited strings for later steps.
          {
            echo "added<<EOF"
            printf '%s\n' "${added[@]}"
            echo "EOF"
            echo "modified<<EOF"
            printf '%s\n' "${modified[@]}"
            echo "EOF"
            echo "other<<EOF"
            printf '%s\n' "${other[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check allowed file changes
        env:
          ADDED: ${{ steps.changed.outputs.added }}
          MODIFIED: ${{ steps.changed.outputs.modified }}
          OTHER: ${{ steps.changed.outputs.other }}
        run: |
          readarray -t added <<< "$ADDED"
          readarray -t modified <<< "$MODIFIED"
          readarray -t other <<< "$OTHER"

          # Check that all changes are either added or modified files.
          if [ -n "${other[0]}" ]; then
            echo "Error: Only added and modified files are allowed, but found: ${other[*]}"
            exit 1
          fi

          # Check that only .zip files and themes.yaml are modified or added.
          for file in "${modified[@]}"; do
            [ -z "$file" ] && continue
            if [[ "$file" != "themes.yaml" && "$file" != *.zip ]]; then
              echo "Error: Only themes.yaml and .zip files are allowed to be modified, but found: $file"
              exit 1
            fi
          done

          for file in "${added[@]}"; do
            [ -z "$file" ] && continue
            if [[ "$file" != *.zip ]]; then
              echo "Error: Only .zip files are allowed to be added, but found: $file"
              exit 1
            fi
          done

          # If there are added files, themes.yaml must be updated.
          if [ -n "${added[0]}" ]; then
            themes_yaml_updated=false
            for file in "${modified[@]}"; do
              if [ "$file" = "themes.yaml" ]; then
                themes_yaml_updated=true
                break
              fi
            done

            if [ "$themes_yaml_updated" = false ]; then
              echo "Error: When adding new files, themes.yaml must be updated."
              exit 1
            fi
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          # Pinned to 3.13 because pe_tools is incompatible with 3.14+
          # (PEP 749 changed __annotations__ behavior, breaking pe_tools' Struct3).
          python-version: '3.13'
          cache-dependency-path: '.github/requirements.txt'

      - name: Install Python dependencies
        run: python -m pip install -r .github/requirements.txt

      - name: Validate themes.yaml
        run: |
          # themes.yaml lives at the repo root, so the cone-mode sparse
          # checkout already includes it; materialize it explicitly to be safe.
          git checkout HEAD -- themes.yaml
          # List every tracked file at HEAD (trees only, no blob fetch) so the
          # validator can confirm each referenced .zip exists without
          # downloading the theme archives.
          git ls-tree -r -z --name-only HEAD > "$RUNNER_TEMP/tracked_files.txt"
          python .github/validate_themes_yaml.py --known-files "$RUNNER_TEMP/tracked_files.txt"

      - name: Validate theme files
        env:
          ADDED: ${{ steps.changed.outputs.added }}
          MODIFIED: ${{ steps.changed.outputs.modified }}
        run: |
          readarray -t added <<< "$ADDED"
          readarray -t modified <<< "$MODIFIED"

          # Collect all .zip files (both added and modified).
          zip_files=()
          for file in "${added[@]}" "${modified[@]}"; do
            [[ "$file" == *.zip ]] && zip_files+=("$file")
          done

          if [ ${#zip_files[@]} -eq 0 ]; then
            echo "No zip files to validate."
            exit 0
          fi

          # Add zip file directories to sparse checkout so git can resolve the paths,
          # then lazy-fetch only the needed zip blobs via the partial clone.
          git sparse-checkout add $(printf '%s\n' "${zip_files[@]}" | xargs -I{} dirname {} | sort -u)
          git checkout HEAD -- "${zip_files[@]}"

          echo "Validating theme files: ${zip_files[*]}"
          python .github/theme_validator.py --packed_themes "${zip_files[@]}"
