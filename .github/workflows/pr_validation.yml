name: PR validation

on:
  pull_request:
    branches:
      - gh-pages

jobs:
  run:
    runs-on: ubuntu-latest
    name: Test changed files
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          # Pinned to 3.13 because pe_tools is incompatible with 3.14+
          # (PEP 749 changed __annotations__ behavior, breaking pe_tools' Struct3).
          python-version: '3.13'
          cache-dependency-path: '.github/requirements.txt'

      - name: Install Python dependencies
        run: python -m pip install -r .github/requirements.txt

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          separator: ","
          safe_output: false # set to false because we are using an environment variable to store the output and avoid command injection.

      - name: Validate changed files
        env:
          ADDED_FILES: ${{ steps.changed-files.outputs.added_files }}
          ADDED_FILES_COUNT: ${{ steps.changed-files.outputs.added_files_count }}
          MODIFIED_FILES: ${{ steps.changed-files.outputs.modified_files }}
          MODIFIED_FILES_COUNT: ${{ steps.changed-files.outputs.modified_files_count }}
          ALL_CHANGED_AND_MODIFIED_FILES_COUNT: ${{ steps.changed-files.outputs.all_changed_and_modified_files_count }}
        run: |
          # Check that all changes are either added or modified files.
          if [ "$ALL_CHANGED_AND_MODIFIED_FILES_COUNT" -ne $((ADDED_FILES_COUNT + MODIFIED_FILES_COUNT)) ]; then
            echo "Error: Only added and modified files are allowed."
            exit 1
          fi

          # Check that only .zip files and themes.yaml are modified or added.
          IFS=',' read -ra MODIFIED_FILES_ARRAY <<< "$MODIFIED_FILES"
          for file in "${MODIFIED_FILES_ARRAY[@]}"; do
            if [[ "$file" != "themes.yaml" && "$file" != *.zip ]]; then
              echo "Error: Only themes.yaml and .zip files are allowed to be modified, but found: $file"
              exit 1
            fi
          done

          IFS=',' read -ra ADDED_FILES_ARRAY <<< "$ADDED_FILES"
          for file in "${ADDED_FILES_ARRAY[@]}"; do
            if [[ "$file" != *.zip ]]; then
              echo "Error: Only .zip files are allowed to be added, but found: $file"
              exit 1
            fi
          done

          # If there are added files, themes.yaml must be updated.
          if [ "$ADDED_FILES_COUNT" -gt 0 ]; then
            themes_yaml_updated=false
            for file in "${MODIFIED_FILES_ARRAY[@]}"; do
              if [ "$file" = "themes.yaml" ]; then
                themes_yaml_updated=true
                break
              fi
            done

            if [ "$themes_yaml_updated" = false ]; then
              echo "Error: When adding new files, themes.yaml must be updated."
              exit 1
            fi
          fi

          # Validate all .zip files (both added and modified)
          zip_files=()
          for file in "${ADDED_FILES_ARRAY[@]}"; do
            if [[ "$file" == *.zip ]]; then
              zip_files+=("$file")
            fi
          done

          for file in "${MODIFIED_FILES_ARRAY[@]}"; do
            if [[ "$file" == *.zip ]]; then
              zip_files+=("$file")
            fi
          done

          if [ ${#zip_files[@]} -gt 0 ]; then
            echo "Validating theme files: ${zip_files[*]}"
            python .github/theme_validator.py --packed_themes "${zip_files[@]}"
          fi
