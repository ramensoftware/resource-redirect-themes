name: Theme validation

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    name: Validate all theme files
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          # Pinned to 3.13 because pe_tools is incompatible with 3.14+
          # (PEP 749 changed __annotations__ behavior, breaking pe_tools' Struct3).
          python-version: '3.13'
          cache-dependency-path: '.github/requirements.txt'

      - name: Install Python dependencies
        run: python -m pip install -r .github/requirements.txt

      - name: Validate themes.yaml
        # Full checkout, so existence is checked against the working tree.
        run: python .github/validate_themes_yaml.py

      - name: Validate changed files
        run: |
          # Validate all .zip files from the themes folder.
          zip_files=()
          if [ -d "themes" ]; then
            while IFS= read -r -d '' file; do
              zip_files+=("$file")
            done < <(find themes -name "*.zip" -type f -print0)
          fi

          if [ ${#zip_files[@]} -gt 0 ]; then
            echo "Validating theme files: ${zip_files[*]}"
            python .github/theme_validator.py --packed_themes "${zip_files[@]}"
          else
            echo "No .zip theme files found in themes folder"
          fi
